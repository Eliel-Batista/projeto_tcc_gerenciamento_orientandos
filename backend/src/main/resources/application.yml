server:
  port: 8080

spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:siaoa;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    date-format: "yyyy-MM-dd'T'HH:mm:ss"
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:testedotcc952@gmail.com}
    password: ${MAIL_PASSWORD:Teste123@#}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:change-me-in-production-use-environment-variable}
  expiration: 86400

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/siaoa}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:siaoa_user}
    password: ${SPRING_DATASOURCE_PASSWORD:siaoa_password}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    date-format: "yyyy-MM-dd'T'HH:mm:ss"

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400

siaoa:
  notifications:
    email-enabled: false
